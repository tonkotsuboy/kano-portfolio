# gitleaks の設定ファイル。
# 既定ルール（https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml）を継承し、
# このリポジトリ固有の誤検知抑制だけを追加する。
title = "kano-portfolio gitleaks config"

[extend]
useDefault = true

# プロジェクト全体の allowlist。
# 「シークレットらしき文字列が含まれていてもよい」と確信できる経路だけを限定的に許可する。
[allowlist]
description = "kano-portfolio project allowlist"
paths = [
  '''pnpm-lock\.yaml$''',
  '''package-lock\.json$''',
  '''yarn\.lock$''',
  '''\.velite/''',
  '''\.next/''',
  '''node_modules/''',
  # 画像・フォントなどのバイナリ。base64 風の文字列がノイズになりがち。
  '''public/.*\.(png|jpe?g|gif|svg|webp|avif|ico|woff2?)$''',
  '''.*\.(png|jpe?g|gif|webp|avif|ico|woff2?)$''',
]
